name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint → Typecheck → Unit + Integration + Perf tests
  # ---------------------------------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Run Typecheck
      run: npm run typecheck

    - name: Run Tests
      run: npm test

  # ---------------------------------------------------------------------------
  # Job 2: Replay regression — verifies all 30 golden replays are deterministic.
  # Runs after build-and-test so it only fires when the code itself compiles.
  # ---------------------------------------------------------------------------
  replay-regression:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run parallel replay regression (30 replays, concurrency 2)
      run: |
        TS_NODE_PROJECT=tsconfig.json \
        npx ts-node \
          --compiler-options '{"module":"commonjs"}' \
          tools/replay-runner/index.ts \
          tests/replays \
          --concurrency 2
