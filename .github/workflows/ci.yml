name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cache Godot Binary
      id: cache-godot
      uses: actions/cache@v4
      with:
        path: ./godot
        key: godot-4.7-stable-linux

    - name: Install Godot
      if: steps.cache-godot.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update && sudo apt-get install -y wget unzip
        wget https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
        unzip Godot_v4.7-stable_linux.x86_64.zip
        mv Godot_v4.7-stable_linux.x86_64 godot
        chmod +x godot

    - name: Run Project Verification
      run: |
        ./godot --headless --scene res://scenes/verify_project.tscn
